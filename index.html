<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr Lags Tuff Website</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    background: #0b0000;
    color: #8b0000;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Grid background */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
        linear-gradient(rgba(139,0,0,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139,0,0,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
}

/* Vignette */
body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    z-index: 1;
}

/* Cursor glow */
.cursor-light {
    position: fixed;
    width: 450px;
    height: 450px;
    background: radial-gradient(circle, rgba(139,0,0,0.35) 0%, transparent 65%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 2;
}

/* Particle canvas */
#particles {
    position: fixed;
    inset: 0;
    z-index: 1;
}

/* Main container */
.container {
    position: relative;
    z-index: 3;
    text-align: center;
}

.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid #8b0000;
    box-shadow: 0 0 25px rgba(139,0,0,0.6);
    object-fit: cover;
    transition: 0.4s ease;
}

.avatar:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(139,0,0,0.9);
}

.username {
    margin-top: 20px;
    font-size: 2.4rem;
    letter-spacing: 4px;
    text-shadow: 0 0 15px rgba(139,0,0,0.8);
}

.status {
    margin-top: 10px;
    font-size: 0.9rem;
    opacity: 0.85;
}

/* Buttons */
.socials {
    margin-top: 30px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

.btn {
    padding: 10px 25px;
    border-radius: 8px;
    border: 2px solid #8b0000;
    background: rgba(20,0,0,0.7);
    color: #8b0000;
    text-decoration: none;
    letter-spacing: 2px;
    transition: 0.3s ease;
    position: relative;
    overflow: hidden;
}

.btn:hover {
    background: rgba(139,0,0,0.25);
    box-shadow: 0 0 25px rgba(139,0,0,0.8);
    transform: scale(1.08);
}

.btn::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(255,0,0,0.3), transparent);
    transform: translateX(-100%);
    transition: 0.6s;
}

.btn:hover::after {
    transform: translateX(100%);
}

/* Volume slider */
.volume-container {
    margin-top: 25px;
}

input[type="range"] {
    width: 200px;
    accent-color: #8b0000;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
    <source src="song.mp3" type="audio/mpeg">
</audio>

<canvas id="particles"></canvas>
<div class="cursor-light" id="cursorLight"></div>

<div class="container">
    <img src="https://cdn.discordapp.com/avatars/646273965769359380/4b22d6ddcf4eb0ca4201cedd24b2ad91.webp?size=1024" class="avatar">
    <div class="username">Mr Lλg</div>
    <div class="status" id="discordStatus">Boggly Googly</div>

    <div class="socials">
        <a href="https://discord.gg/AmsWtXMgmT" class="btn" target="_blank">Discord</a>
        <a href="https://www.youtube.com/@Mr-Laagg" class="btn" target="_blank">YouTube</a>
    </div>

    <div class="volume-container">
        <input type="range" min="0" max="1" step="0.01" value="0.5" id="volumeSlider">
    </div>
</div>

<script>
/* Cursor Glow */
const cursorLight = document.getElementById("cursorLight");
document.addEventListener("mousemove", e => {
    cursorLight.style.left = e.clientX + "px";
    cursorLight.style.top = e.clientY + "px";
});

/* Music + Volume */
const music = document.getElementById("bgMusic");
const volumeSlider = document.getElementById("volumeSlider");

music.volume = 0.5;

volumeSlider.addEventListener("input", () => {
    music.volume = volumeSlider.value;
});

document.addEventListener("click", () => {
    music.volume = 0;
    music.play().then(() => {
        let vol = 0;
        const fade = setInterval(() => {
            if (vol < 0.5) {
                vol += 0.01;
                music.volume = vol;
            } else {
                clearInterval(fade);
            }
        }, 50);
    }).catch(() => {});
}, { once: true });


/* Play on first click */
document.addEventListener("click", () => {
    music.play().catch(() => {});
}, { once: true });

/* Discord Status */
async function fetchDiscord() {
    try {
        const res = await fetch("https://api.lanyard.rest/v1/users/646273965769359380");
        const data = await res.json();
        const status = data.data.discord_status;
        document.getElementById("state").innerText = "Discord: " + status;
    } catch {
        document.getElementById("state").innerText = "Discord: unavailable";
    }
}
fetchDiscord();
setInterval(fetchDiscord, 30000);

/* Floating Red Particles */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 80; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2,
        speed: Math.random() * 0.5 + 0.2
    });
}

function animateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "rgba(139,0,0,0.7)";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();

        p.y -= p.speed;

        if (p.y < 0) {
            p.y = canvas.height;
            p.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(animateParticles);
}

animateParticles();
</script>

</body>
</html>
